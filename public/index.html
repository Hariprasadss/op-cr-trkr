<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Credit Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #07080c;
    --bg-2: #0d1018;
    --panel: rgba(22, 26, 36, 0.72);
    --panel-solid: #151926;
    --border: rgba(255, 255, 255, 0.07);
    --border-strong: rgba(255, 255, 255, 0.14);
    --text: #f2f4f9;
    --muted: #8b93a8;
    --faint: #5b6276;
    --good: #34d399;
    --bad: #fb7185;
    --warn: #fbbf24;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background:
      radial-gradient(900px 500px at 85% -8%, rgba(99,102,241,.16), transparent 60%),
      radial-gradient(800px 500px at 8% 0%, rgba(34,197,94,.10), transparent 55%),
      var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    letter-spacing: -0.01em;
  }
  .num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
  .wrap { max-width: 1120px; margin: 0 auto; padding: 40px 24px 72px; }

  /* Header */
  .topbar { display: flex; align-items: flex-start; gap: 20px; flex-wrap: wrap; }
  .brand { display: flex; align-items: center; gap: 13px; }
  .logo {
    width: 40px; height: 40px; border-radius: 11px; flex: none;
    background: linear-gradient(140deg, #6366f1, #22c55e);
    display: grid; place-items: center; box-shadow: 0 6px 22px rgba(99,102,241,.35);
  }
  .logo svg { width: 22px; height: 22px; }
  .brand h1 { font-size: 19px; font-weight: 700; margin: 0; line-height: 1.1; }
  .brand p { font-size: 13px; color: var(--muted); margin: 3px 0 0; }

  .controls { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .pill-toggle {
    display: inline-flex; align-items: center; gap: 9px; cursor: pointer; user-select: none;
    background: var(--panel); border: 1px solid var(--border); border-radius: 999px;
    padding: 8px 14px 8px 12px; font-size: 13px; color: var(--muted); backdrop-filter: blur(8px);
  }
  .pill-toggle .switch { width: 32px; height: 18px; border-radius: 999px; background: #2a3040; position: relative; transition: background .2s; flex: none; }
  .pill-toggle .switch::after { content: ""; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; border-radius: 50%; background: #fff; transition: transform .2s; }
  .pill-toggle input { display: none; }
  .pill-toggle input:checked + .switch { background: var(--good); }
  .pill-toggle input:checked + .switch::after { transform: translateX(14px); }

  .btn {
    display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 600; font-size: 13.5px;
    color: #0b0d12; background: linear-gradient(180deg, #ffffff, #dfe3ee);
    border: none; border-radius: 11px; padding: 10px 17px; transition: transform .1s, box-shadow .2s, opacity .2s;
    box-shadow: 0 4px 16px rgba(0,0,0,.3);
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,.4); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: .6; cursor: default; transform: none; }
  .btn svg { width: 15px; height: 15px; }
  .btn.spin svg { animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Hero total */
  .hero {
    margin: 28px 0 24px; padding: 28px 30px; border-radius: 22px;
    background: linear-gradient(180deg, rgba(28,33,46,.85), rgba(15,18,27,.85));
    border: 1px solid var(--border); backdrop-filter: blur(14px);
    display: flex; align-items: center; gap: 32px; flex-wrap: wrap;
    box-shadow: 0 24px 60px -28px rgba(0,0,0,.8);
  }
  .hero .label { font-size: 12.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; font-weight: 600; }
  .hero .total { font-size: 56px; font-weight: 800; line-height: 1; margin-top: 6px; letter-spacing: -0.03em;
    background: linear-gradient(180deg, #fff, #aeb6ff); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .hero .sub { font-size: 13px; color: var(--faint); margin-top: 10px; }
  .hero-stats { margin-left: auto; display: flex; gap: 14px; flex-wrap: wrap; }
  .stat { background: rgba(255,255,255,.03); border: 1px solid var(--border); border-radius: 14px; padding: 14px 18px; min-width: 116px; }
  .stat .v { font-size: 22px; font-weight: 700; }
  .stat .k { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .live-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--good); margin-right: 6px; box-shadow: 0 0 0 0 rgba(52,211,153,.6); animation: pulse 2s infinite; vertical-align: middle; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(52,211,153,.5); } 70% { box-shadow: 0 0 0 7px rgba(52,211,153,0); } 100% { box-shadow: 0 0 0 0 rgba(52,211,153,0); } }

  /* Cards */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 18px; }
  .card {
    position: relative; overflow: hidden; border-radius: 18px; padding: 22px;
    background: var(--panel); border: 1px solid var(--border); backdrop-filter: blur(12px);
    transition: transform .18s, border-color .18s; box-shadow: 0 14px 40px -24px rgba(0,0,0,.7);
  }
  .card:hover { transform: translateY(-3px); border-color: var(--border-strong); }
  .card .glow { position: absolute; top: -40%; right: -20%; width: 200px; height: 200px; border-radius: 50%; background: var(--accent); opacity: .14; filter: blur(40px); pointer-events: none; }
  .card .head { display: flex; align-items: center; gap: 10px; }
  .card .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); flex: none; }
  .card .pname { font-weight: 600; font-size: 15px; }
  .card .status { margin-left: auto; font-size: 11px; font-weight: 600; padding: 4px 9px; border-radius: 999px; display: inline-flex; align-items: center; gap: 5px; }
  .status.ok { color: var(--good); background: rgba(52,211,153,.12); }
  .status.err { color: var(--bad); background: rgba(251,113,133,.12); }
  .status .s-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .card .value { font-size: 40px; font-weight: 800; letter-spacing: -0.03em; line-height: 1; margin: 20px 0 4px; }
  .card .value.err { font-size: 17px; font-weight: 600; color: var(--bad); }
  .card .unit { font-size: 16px; font-weight: 600; color: var(--faint); margin-left: 3px; }
  .card .detail { font-size: 12.5px; color: var(--muted); min-height: 16px; }
  .card .delta { margin-top: 12px; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 5px; }
  .delta.up { color: var(--good); }
  .delta.down { color: var(--bad); }
  .delta.flat { color: var(--faint); }
  .spark { margin-top: 14px; width: 100%; height: 44px; display: block; }
  .spark .line { fill: none; stroke: var(--accent); stroke-width: 2; stroke-linejoin: round; stroke-linecap: round; }
  .spark .area { stroke: none; }

  footer { margin-top: 36px; text-align: center; color: var(--faint); font-size: 12px; }
  footer a { color: var(--muted); }
  .grid.loading .card { opacity: .55; }
  @media (max-width: 560px) { .hero .total { font-size: 44px; } .hero-stats { margin-left: 0; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 17l5-5 4 4 8-8"/><path d="M21 8v5h-5"/>
        </svg>
      </div>
      <div>
        <h1>Credit Monitor</h1>
        <p>API credit balances across your data stack</p>
      </div>
    </div>
    <div class="controls">
      <label class="pill-toggle">
        <input type="checkbox" id="auto" checked />
        <span class="switch"></span>
        <span>Auto-refresh</span>
      </label>
      <button class="btn" id="refresh">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/>
        </svg>
        <span id="refresh-label">Refresh</span>
      </button>
    </div>
  </div>

  <div class="hero">
    <div>
      <div class="label">Total credits remaining</div>
      <div class="total num" id="total">0</div>
      <div class="sub" id="hero-sub">Fetching live balances…</div>
    </div>
    <div class="hero-stats">
      <div class="stat"><div class="v num" id="stat-online">—</div><div class="k">Providers online</div></div>
      <div class="stat"><div class="v"><span class="live-dot"></span><span id="stat-synced">—</span></div><div class="k">Last synced</div></div>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <footer>Balance checks are free &amp; non-consuming · API keys stay server-side in Netlify environment variables</footer>
</div>

<script>
const HISTORY_KEY = "credit-monitor-history-v2";
const MAX_POINTS = 240;
const USD_IDS = new Set(); // populated from response (unit === "usd")

function fmt(n, { prefix = "", decimals = 0 } = {}) {
  if (n == null || isNaN(n)) return "—";
  return prefix + Number(n).toLocaleString("en-US", { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

// Animated count-up. Stores last value on the element so refreshes animate the delta;
// first paint animates 0 -> value (the "live counter" on open).
function countUp(el, to, opts) {
  const from = Number(el.dataset.val ?? 0);
  el.dataset.val = to;
  if (from === to) { el.textContent = fmt(to, opts); return; }
  const dur = 950, start = performance.now();
  function frame(now) {
    const t = Math.min(1, (now - start) / dur);
    const eased = 1 - Math.pow(1 - t, 3);
    el.textContent = fmt(from + (to - from) * eased, opts);
    if (t < 1) requestAnimationFrame(frame);
    else el.textContent = fmt(to, opts);
  }
  requestAnimationFrame(frame);
  // Fallback: rAF is throttled in background/non-painting tabs, which would
  // leave the number stuck at its start value. Guarantee the final value lands.
  setTimeout(() => { el.textContent = fmt(to, opts); }, dur + 80);
}

function loadHistory() { try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || {}; } catch { return {}; } }
function saveHistory(h) { try { localStorage.setItem(HISTORY_KEY, JSON.stringify(h)); } catch {} }

function sparkline(points, color) {
  if (points.length < 2) return `<div class="spark"></div>`;
  const vals = points.map(p => p.c);
  const min = Math.min(...vals), max = Math.max(...vals), range = (max - min) || 1;
  const W = 260, H = 44, pad = 4, step = W / (points.length - 1);
  const xy = points.map((p, i) => [i * step, H - pad - ((p.c - min) / range) * (H - pad * 2)]);
  const line = xy.map(([x, y], i) => (i ? "L" : "M") + x.toFixed(1) + " " + y.toFixed(1)).join(" ");
  const id = "g" + Math.abs(color.split("").reduce((a, c) => a + c.charCodeAt(0), 0));
  return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="--accent:${color}">
    <defs><linearGradient id="${id}" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.35"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    <path class="area" d="${line} L${W} ${H} L0 ${H} Z" fill="url(#${id})"/>
    <path class="line" d="${line}"/></svg>`;
}

function deltaHtml(points) {
  if (points.length < 2) return `<div class="delta flat">No prior reading yet</div>`;
  const prev = points[points.length - 2].c, cur = points[points.length - 1].c;
  const d = Math.round((cur - prev) * 100) / 100;
  if (d === 0) return `<div class="delta flat">● No change since last check</div>`;
  return `<div class="delta ${d > 0 ? "up" : "down"}">${d > 0 ? "▲" : "▼"} ${fmt(Math.abs(d))} since last check</div>`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function optsFor(p) {
  const usd = p.unit === "usd";
  const dec = usd ? 2 : (Number.isInteger(p.credits) ? 0 : 1);
  return { prefix: usd ? "$" : "", decimals: dec };
}

function render(data) {
  const history = loadHistory();
  const ts = Date.now();
  let total = 0, online = 0;

  for (const p of data.providers) {
    if (p.unit === "usd") USD_IDS.add(p.id);
    if (p.ok && typeof p.credits === "number") {
      online++;
      if (p.unit !== "usd") total += p.credits; // keep the headline total in pure credits
      const arr = history[p.id] || (history[p.id] = []);
      const last = arr[arr.length - 1];
      if (!last || last.c !== p.credits) arr.push({ t: ts, c: p.credits });
      if (arr.length > MAX_POINTS) arr.splice(0, arr.length - MAX_POINTS);
    }
  }
  saveHistory(history);

  // Build / update cards
  document.getElementById("grid").innerHTML = data.providers.map(p => {
    const pts = history[p.id] || [];
    if (p.ok) {
      const o = optsFor(p);
      return `<div class="card" style="--accent:${p.color}">
        <div class="glow"></div>
        <div class="head"><span class="dot"></span><span class="pname">${escapeHtml(p.name)}</span>
          <span class="status ok"><span class="s-dot"></span>Live</span></div>
        <div class="value num" id="v-${p.id}" data-prefix="${o.prefix}" data-dec="${o.decimals}">${o.prefix}0</div>
        <div class="detail">${escapeHtml(p.detail || "")}</div>
        ${deltaHtml(pts)}
        ${sparkline(pts, p.color)}
      </div>`;
    }
    return `<div class="card" style="--accent:${p.color}">
      <div class="glow"></div>
      <div class="head"><span class="dot"></span><span class="pname">${escapeHtml(p.name)}</span>
        <span class="status err"><span class="s-dot"></span>Error</span></div>
      <div class="value err">⚠ ${escapeHtml(p.error || "Unavailable")}</div>
      <div class="detail">Could not reach provider</div>
    </div>`;
  }).join("");

  // Animate each card's counter
  for (const p of data.providers) {
    if (!p.ok || typeof p.credits !== "number") continue;
    const el = document.getElementById("v-" + p.id);
    if (el) countUp(el, p.credits, optsFor(p));
  }

  // Hero
  countUp(document.getElementById("total"), total, { decimals: 0 });
  document.getElementById("stat-online").textContent = `${online}/${data.providers.length}`;
  document.getElementById("stat-synced").textContent = new Date(data.updatedAt).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  const usdProviders = data.providers.filter(p => p.ok && p.unit === "usd");
  const note = usdProviders.length
    ? ` · ${usdProviders.map(p => p.name + " tracked as $ budget").join(", ")}`
    : "";
  document.getElementById("hero-sub").textContent = `Across ${online} live provider${online === 1 ? "" : "s"}${note}`;
}

let busy = false;
async function refresh() {
  if (busy) return;
  busy = true;
  const btn = document.getElementById("refresh");
  const lbl = document.getElementById("refresh-label");
  btn.disabled = true; btn.classList.add("spin"); lbl.textContent = "Syncing…";
  document.getElementById("grid").classList.add("loading");
  try {
    const r = await fetch("/api/credits", { cache: "no-store" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    render(await r.json());
  } catch (e) {
    document.getElementById("hero-sub").textContent = "Failed to sync: " + e.message;
  } finally {
    busy = false;
    btn.disabled = false; btn.classList.remove("spin"); lbl.textContent = "Refresh";
    document.getElementById("grid").classList.remove("loading");
  }
}

let timer = null;
function setAuto(on) {
  if (timer) { clearInterval(timer); timer = null; }
  if (on) timer = setInterval(refresh, 60000);
}
document.getElementById("refresh").addEventListener("click", refresh);
document.getElementById("auto").addEventListener("change", e => setAuto(e.target.checked));

// Live counter fires on first open.
refresh();
setAuto(true);
</script>
</body>
</html>
